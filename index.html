<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Fereira | Inicio</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./CSS/index.css">
    <link rel="stylesheet" href="./CSS/productos.css">
</head>

<body>
    <header>
        <a href="./index.html" class="logo">Ferreira Hogar</a>
        <i class='bx bx-cart cart-icon'><span class="cart-count">0</span></i>
        
        <input type="checkbox" id="check">
        <label for="check" class="icons">
            <i class='bx bx-menu' id="menu-icon"></i>
            <i class='bx bx-x' id="close-icon"></i>
        </label>
        
        <nav class="navbar">
            <a href="./index.html" style="--i:0;">Inicio</a>
            <a href="./PAGES/productos.html" style="--i:1;">Productos</a>
            <a href="./PAGES/cuotas.html" style="--i:3;">Cuotas</a>
        </nav>
    </header>

    <main>
        <aside class="nose">
            <aside class="animate__animated animate__rotateIn">
                <img src="/asset/oficial PNG-PhotoRoom.png" width="250px" alt="">
            </aside>

            <aside>
                <h2>-10% off en todos nuestros productos con su compra en efectivo!</h2>
            </aside>

            <aside class="enlaces-iconos">
                <div class="icon">
                    <a href="https://www.instagram.com/ferreirahogar/?hl=en">
                        <svg height="80" width="80">
                            <circle cx="40" cy="40" r="35" stroke="black" stroke-width="4" fill="none"></circle>
                        </svg>
                        <i class='bx bxl-instagram'></i>
                    </a>
                </div>

                <div class="icon">
                    <a href="https://wa.me/+5401138002078">
                        <svg height="80" width="80">
                            <circle cx="40" cy="40" r="35" stroke="black" stroke-width="4" fill="none"></circle>
                        </svg>
                        <i class='bx bxl-whatsapp'></i>
                    </a>
                </div>

                <div class="icon">
                    <a href="https://www.tiktok.com/@ferreirahogar1">
                        <svg height="80" width="80">
                            <circle cx="40" cy="40" r="35" stroke="black" stroke-width="4" fill="none"></circle>
                        </svg>
                        <i class='bx bxl-tiktok'></i>
                    </a>
                </div>
            </aside>
        </aside>

        <aside class="cart">
            <h2>Tu Carrito</h2>
            <ul class="cart-list"></ul>
            <br>
            <p class="total">Total de la compra: <b>$ <span>0.00</span></b></p>
            <button class="clear-cart">Limpiar Carrito</button>
        </aside>
    </main>

    <footer>
        <p>Grupo Ferreira Hogar© 2024. Todos los derechos reservados. | by: BullScript.</p>
    </footer>

    <script src="../JAVASCRIPT/productos.js"></script>
    <script src="./script.js"></script>
</body>

</html>
